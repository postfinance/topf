name: dev-release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: latest
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push dev docker images
        run: |
          for img in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/postfinance/topf:'); do
            arch="${img##*-}"
            docker tag "$img" "ghcr.io/postfinance/topf:dev-${arch}"
            docker push "ghcr.io/postfinance/topf:dev-${arch}"
          done
          docker manifest create ghcr.io/postfinance/topf:dev \
            ghcr.io/postfinance/topf:dev-amd64 \
            ghcr.io/postfinance/topf:dev-arm64
          docker manifest push ghcr.io/postfinance/topf:dev
