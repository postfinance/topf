name: test

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: Install sops
        env:
          SOPS_VERSION: "3.12.2"
        run: |
          curl -fsSLo sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/
          sops --version
      - name: Install age
        env:
          AGE_VERSION: "1.3.1"
        run: |
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv age/age age/age-keygen /usr/local/bin/
          age --version
      - name: Install vals
        env:
          VALS_VERSION: "0.44.0"
        run: |
          curl -fsSL "https://github.com/helmfile/vals/releases/download/v${VALS_VERSION}/vals_${VALS_VERSION}_linux_amd64.tar.gz" | tar xz vals
          sudo mv vals /usr/local/bin/
          vals version
      - name: Run tests
        run: go test -v -race ./...
